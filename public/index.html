<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Open World - Iván Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HUD del juego -->
    <div id="hud">
        <!-- Velocímetro -->
        <div id="speedometer">
            <div class="speed-value">
                <span id="speed">0</span>
                <span class="unit">KM/H</span>
            </div>
            <div class="speed-bar">
                <div id="speedBar"></div>
            </div>
        </div>

        <!-- Info esquina superior izquierda -->
        <div id="info">
            <div>🌆 <strong>DUBAI</strong></div>
            <div id="time">🕐 12:00</div>
            <div id="fps">FPS: 60</div>
        </div>

        <!-- Minimapa -->
        <div id="minimap">
            <canvas id="minimapCanvas" width="200" height="200"></canvas>
            <div class="minimap-label">📍 MAPA</div>
        </div>

        <!-- Controles -->
        <div id="controls">
            <div><kbd>W</kbd> Acelerar</div>
            <div><kbd>S</kbd> Frenar / Marcha atrás</div>
            <div><kbd>A</kbd> <kbd>D</kbd> Girar</div>
            <div><kbd>Espacio</kbd> Freno de mano</div>
            <div><kbd>C</kbd> Cambiar cámara</div>
            <div><kbd>R</kbd> Resetear coche</div>
            <div><kbd>N</kbd> Cambiar hora</div>
        </div>

        <!-- Mensaje de carga -->
        <div id="loadingScreen">
            <h1>🌆 DUBAI</h1>
            <p>Cargando ciudad...</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- Importmap para Three.js (carga desde CDN, no necesita npm) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>

    <!-- Script principal -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
